<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Bitcoin en Vivo</title>
    <style>
        body { background-color: #0d0e15; color: #ffffff; font-family: sans-serif; text-align: center; padding: 20px; }
        .tarjeta { background: #161824; border: 1px solid #00ffcc; padding: 30px; border-radius: 12px; display: inline-block; max-width: 500px; box-shadow: 0px 0px 20px rgba(0, 255, 204, 0.2); }
        h1 { color: #00ffcc; margin-bottom: 5px; letter-spacing: 1px; }
        .precio-contenedor { margin: 25px 0; }
        .precio { font-size: 42px; color: #fffb00; font-weight: bold; transition: all 0.3s ease; }
        .estado { color: #00ffcc; font-size: 14px; font-weight: bold; }
        .alerta { background: rgba(0, 255, 204, 0.1); border-left: 4px solid #00ffcc; padding: 10px; border-radius: 4px; font-size: 13px; text-align: left; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="tarjeta">
        <h1>📊 SPARK MONITOR</h1>
        <p style="color: #888; margin-top: 0;">Control de Activos en Tiempo Real</p>
        <hr style="border-color: #00ffcc; opacity: 0.3;">
        
        <div class="precio-contenedor">
            <p style="margin: 0; color: #aaa; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">Precio Bitcoin (USD)</p>
            <p id="precio-btc" class="precio">Cargando...</p> 
            <p id="estado-actualizacion" class="estado">🟢 CONECTADO</p>
        </div>

        <div class="alerta">
            <strong>🧠 Análisis de IA (Simulado):</strong> 
            <span style="color: #ddd;">El mercado presenta alta liquidez en este rango. Excelente momento para monitoreo de operaciones automatizadas.</span>
        </div>
    </div>

    <script>
        const elementoPrecio = document.getElementById('precio-btc');
        const elementoEstado = document.getElementById('estado-actualizacion');

        // Función que va a internet y trae el precio fresco
        async function actualizarPrecio() {
            try {
                elementoEstado.innerText = "🔄 ACTUALIZANDO...";
                elementoEstado.style.color = "#fffb00";

                // Consultamos la API de Coinbase directamente desde el navegador
                const respuesta = await fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot');
                const datos = await respuesta.json();
                const precio = parseFloat(datos.data.amount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

                // Inyectamos el precio en la página web
                elementoPrecio.innerText = `$${precio} USD`;
                
                elementoEstado.innerText = "🟢 EN VIVO";
                elementoEstado.style.color = "#00ffcc";
            } catch (error) {
                elementoPrecio.innerText = "Error de conexión";
                elementoEstado.innerText = "❌ ERROR";
                elementoEstado.style.color = "#ff0055";
            }
        }

        // Ejecutamos la función apenas se abra la página
        actualizarPrecio();

        // REPETIDOR: Hace que la función se ejecute sola cada 5 segundos (5000 milisegundos)
        setInterval(actualizarPrecio, 5000);
    </script>
</body>
</html>
