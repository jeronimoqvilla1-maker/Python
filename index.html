<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark Monitor - Executive Dashboard</title>
    <style>
        body { background-color: #0d0e15; color: #ffffff; font-family: sans-serif; text-align: center; padding: 20px; transition: background 0.5s ease; }
        .tarjeta { background: #161824; border: 1px solid #00ffcc; padding: 30px; border-radius: 12px; display: inline-block; max-width: 500px; text-align: left; box-shadow: 0px 0px 20px rgba(0, 255, 204, 0.1); }
        h1 { color: #00ffcc; margin: 0 0 5px 0; text-align: center; }
        .sub { color: #888; text-align: center; margin-bottom: 20px; font-size: 14px; }
        .precio-box { text-align: center; background: #1f2235; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; }
        .precio { font-size: 38px; color: #fffb00; font-weight: bold; margin: 5px 0; }
        .estado { color: #00ffcc; font-size: 12px; font-weight: bold; }
        
        /* Sección de IA */
        .seccion-ia { background: rgba(0, 255, 204, 0.05); border: 1px dashed #00ffcc; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .ia-titulo { color: #00ffcc; font-weight: bold; font-size: 14px; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        
        /* Sección de Formulario (Lead Capture) */
        .formulario-box { background: #1f2235; padding: 20px; border-radius: 8px; border: 1px solid #444; }
        .form-titulo { font-size: 14px; color: #fff; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="email"] { background: #0d0e15; border: 1px solid #00ffcc; padding: 10px; color: white; border-radius: 4px; width: 91%; margin-bottom: 10px; font-size: 14px; }
        button { background: #00ffcc; color: #0d0e15; border: none; padding: 10px; font-weight: bold; border-radius: 4px; width: 100%; cursor: pointer; font-size: 14px; transition: 0.2s; }
        button:hover { background: #fffb00; }

        .alerta-activa { background-color: #400c16 !important; }
    </style>
</head>
<body>

    <div id="mi-tarjeta" class="tarjeta">
        <h1>📊 SPARK MONITOR PRO</h1>
        <p class="sub">Sistemas Autónomos de Próxima Generación</p>
        
        <div class="precio-box">
            <span style="color: #aaa; font-size: 12px; text-transform: uppercase;">Bitcoin (USD)</span>
            <p id="precio-btc" class="precio">Cargando...</p>
            <span id="estado-actualizacion" class="estado">🟢 CONECTADO</span>
        </div>

        <div class="seccion-ia">
            <div class="ia-titulo">🤖 CORE-AI ANALYTICS:</div>
            <p id="ia-reporte" style="color: #ddd; font-size: 13px; margin: 0; line-height: 1.4;">
                Iniciando redes neuronales... Analizando bloques de mercado...
            </p>
        </div>

        <div class="formulario-box" id="caja-registro">
            <div class="form-titulo">📩 Suscríbete a Alertas Premium</div>
            <p style="color: #aaa; font-size: 12px; margin-top: 0;">Deja tu correo para recibir un aviso al celular si el mercado colapsa.</p>
            
            <form id="form-cliente">
                <input type="email" id="correo-usuario" placeholder="tu-correo@gmail.com" required>
                <button type="submit">Activar Alertas de Inversión</button>
            </form>
        </div>
    </div>

    <script>
        const elementoPrecio = document.getElementById('precio-btc');
        const elementoEstado = document.getElementById('estado-actualizacion');
        const elementoIA = document.getElementById('ia-reporte');
        const formulario = document.getElementById('form-cliente');
        const cajaRegistro = document.getElementById('caja-registro');

        let precioAnterior = 0;

        // 1. MOTOR DE INTELIGENCIA ARTIFICIAL INTERNO
        function generarAnalisisIA(precioActual) {
            let tendencia = "";
            let recomendacion = "";
            
            if (precioAnterior === 0) {
                tendencia = "estabilizándose en rangos óptimos.";
                recomendacion = "Mantener posiciones estables y observar zonas de liquidez.";
            } else if (precioActual > precioAnterior) {
                tendencia = "con un impulso alcista de alta velocidad.";
                recomendacion = "⚠️ Alerta de FOMO. Buen momento para asegurar ganancias parciales.";
            } else if (precioActual < precioAnterior) {
                tendencia = "experimentando una corrección técnica de ballenas.";
                recomendacion = "🛑 Zona de descuento. Monitorear soportes clave antes de buscar entradas.";
            } else {
                tendencia = "en consolidación lateral comprimida.";
                recomendacion = "Baja volatilidad. El mercado está acumulando energía para el siguiente quiebre.";
            }

            precioAnterior = precioActual;

            // Retornamos el texto formateado que simula la respuesta de la IA
            return `[Reporte Automático] El precio de Bitcoin se encuentra en $${precioActual.toLocaleString()} USD, ${tendencia} Análisis algorítmico sugiere: ${recomendacion}`;
        }

        // 2. CONEXIÓN A LA API FINANCIERA
        async function actualizarDashboard() {
            try {
                elementoEstado.innerText = "🔄 PROCESANDO...";
                const respuesta = await fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot');
                const datos = await respuesta.json();
                const precioNumerico = parseFloat(datos.data.amount);

                // Actualizar precio en pantalla
                elementoPrecio.innerText = `$${precioNumerico.toLocaleString('en-US', { minimumFractionDigits: 2 })} USD`;
                elementoEstado.innerText = "🟢 EN VIVO";
                elementoEstado.style.color = "#00ffcc";

                // Ejecutar la IA con los nuevos datos
                const informeFinal = generarAnalisisIA(precioNumerico);
                elementoIA.innerText = informeFinal;

            } catch (error) {
                elementoPrecio.innerText = "Error de Red";
                elementoEstado.innerText = "❌ DESCONECTADO";
                elementoEstado.style.color = "#ff0055";
            }
        }

        // 3. CAPTURA DE DATOS DEL CLIENTE (BASE DE DATOS LOCAL)
        formulario.addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue
            const correo = document.getElementById('correo-usuario').value;

            // Guardamos el correo en la memoria del navegador (Simulación de DB)
            localStorage.setItem('cliente_premium', correo);

            // Cambiamos la interfaz para darle las gracias al cliente
            cajaRegistro.innerHTML = `
                <div style="text-align: center; color: #00ffcc; font-weight: bold; font-size: 14px;">
                    ✅ ¡CONEXIÓN EXITOSA!<br>
                    <span style="color: #fff; font-size: 12px; font-weight: normal;">
                        El correo <strong>${correo}</strong> ha sido registrado en el nodo de Spark Monitor.
                    </span>
                </div>
            `;
        });

        // Inicializar y repetir cada 6 segundos
        actualizarDashboard();
        setInterval(actualizarDashboard, 6000);
    </script>
</body>
</html>
