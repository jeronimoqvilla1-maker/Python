<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Inteligente - Spark Monitor</title>
    <style>
        body { background-color: #0d0e15; color: #ffffff; font-family: sans-serif; text-align: center; padding: 20px; transition: background 0.5s ease; }
        .tarjeta { background: #161824; border: 1px solid #00ffcc; padding: 30px; border-radius: 12px; display: inline-block; max-width: 500px; box-shadow: 0px 0px 20px rgba(0, 255, 204, 0.2); }
        h1 { color: #00ffcc; margin-bottom: 5px; }
        .precio-contenedor { margin: 25px 0; }
        .precio { font-size: 42px; color: #fffb00; font-weight: bold; }
        .estado { color: #00ffcc; font-size: 14px; font-weight: bold; }
        
        /* Nuevos estilos para el panel de control */
        .panel-control { background: #1f2235; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #444; }
        input { background: #0d0e15; border: 1px solid #00ffcc; padding: 8px; color: white; border-radius: 4px; text-align: center; width: 60%; font-size: 16px; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }
        
        /* Estado de Alerta Alarma */
        .alerta-activa { background-color: #550011 !important; }
        .tarjeta-alerta { border-color: #ff0055 !important; box-shadow: 0px 0px 20px rgba(255, 0, 85, 0.4) !important; }
    </style>
</head>
<body>

    <div id="mi-tarjeta" class="tarjeta">
        <h1>📊 SPARK MONITOR PRO</h1>
        <p style="color: #888; margin-top: 0;">Sistema de Alertas Tempranas</p>
        <hr style="border-color: #00ffcc; opacity: 0.3;">
        
        <div class="precio-contenedor">
            <label>Precio Bitcoin en Vivo (USD)</label>
            <p id="precio-btc" class="precio">Cargando...</p> 
            <p id="estado-actualizacion" class="estado">🟢 CONECTADO</p>
        </div>

        <div class="panel-control">
            <label for="precio-limite">🚨 Alerta si el precio cae de:</label>
            <input type="number" id="precio-limite" value="60000" placeholder="Ej: 65000">
        </div>
    </div>

    <script>
        const elementoPrecio = document.getElementById('precio-btc');
        const elementoEstado = document.getElementById('estado-actualizacion');
        const elementoLimite = document.getElementById('precio-limite');
        const tarjeta = document.getElementById('mi-tarjeta');
        const cuerpoWeb = document.body;

        let precioNumericoActual = 0;

        async function actualizarPrecio() {
            try {
                elementoEstado.innerText = "🔄 COMPROBANDO...";
                
                const respuesta = await fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot');
                const datos = await respuesta.json();
                
                // Guardamos el precio crudo en una variable para hacer matemáticas
                precioNumericoActual = parseFloat(datos.data.amount);
                
                // Lo formateamos bonito para mostrar en pantalla
                elementoPrecio.innerText = `$${precioNumericoActual.toLocaleString('en-US', { minimumFractionDigits: 2 })} USD`;
                
                elementoEstado.innerText = "🟢 EN VIVO";
                elementoEstado.style.color = "#00ffcc";

                // --- AQUÍ ESTÁ LA LÓGICA DE NEGOCIO (IF / ELSE) ---
                const limiteUsuario = parseFloat(elementoLimite.value);

                if (precioNumericoActual < limiteUsuario) {
                    // SI el precio es menor al límite: ACTIVAR ALARMA (Pantalla roja)
                    cuerpoWeb.classList.add('alerta-activa');
                    tarjeta.classList.add('tarjeta-alerta');
                    elementoEstado.innerText = "🚨 ¡ALERTA: PRECIO BAJO CRÍTICO!";
                    elementoEstado.style.color = "#ff0055";
                } else {
                    // SI NO: Todo normal (Mantener colores neón originales)
                    cuerpoWeb.classList.remove('alerta-activa');
                    tarjeta.classList.remove('tarjeta-alerta');
                }

            } catch (error) {
                elementoPrecio.innerText = "Error de conexión";
                elementoEstado.innerText = "❌ ERROR";
                elementoEstado.style.color = "#ff0055";
            }
        }

        // Ejecutar al abrir y repetir cada 5 segundos
        actualizarPrecio();
        setInterval(actualizarPrecio, 5000);
    </script>
</body>
</html>
